  <!-- خطوط عربية -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- خطوط إنجليزية -->

  <!-- CSS داخلي -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'El Messiri', 'Noto Naskh Arabic', 'Montserrat', sans-serif;
      direction: rtl;
      text-align: right;
      background-color: #f9fafb;
      color: #1f2937;
      line-height: 1.6;
    }
    
    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* تحسينات للعربية */
    .arabic-text {
      font-family: 'El Messiri', 'Noto Naskh Arabic', sans-serif;
      letter-spacing: 0;
    }
    
    .english-text {
      font-family: 'Montserrat', 'Poppins', sans-serif;
      letter-spacing: 0.5px;
    }
    
    /* Loader أثناء تحميل React */
    #root:empty::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
      z-index: 9999;
    }
    
    #root:empty::after {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      border: 3px solid #d97706;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 10000;
    }
    
    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- رسالة للمستخدمين الذين لديهم JavaScript معطل -->
  <noscript>
    <div style="text-align: center; padding: 50px 20px; background: #fef3c7; color: #92400e; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column;">
      <h1 style="font-family: 'El Messiri', sans-serif; font-size: 2rem; margin-bottom: 20px; color: #92400e;">
        عذراً، JavaScript غير مفعل
      </h1>
      <p style="font-size: 1.2rem; max-width: 600px; margin-bottom: 30px; color: #78350f;">
        يحتاج موقع DEMORE | THE DESIGN AND MORE إلى JavaScript للعمل بشكل صحيح.<br>
        يرجى تفعيل JavaScript في إعدادات متصفحك ثم إعادة تحميل الصفحة.
      </p>
      <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
        <h2 style="font-family: 'Montserrat', sans-serif; color: #d97706; margin-bottom: 15px;">كيف تفعل JavaScript:</h2>
        <ul style="text-align: right; list-style: none; padding: 0;">
          <li style="margin-bottom: 10px; padding-right: 20px;">✅ <strong>Chrome:</strong> الإعدادات → الخصوصية والأمان → إعدادات الموقع → JavaScript</li>
          <li style="margin-bottom: 10px; padding-right: 20px;">✅ <strong>Firefox:</strong> الإعدادات → الخصوصية والأمان → السماح لمواقع الويب بتنفيذ JavaScript</li>
          <li style="margin-bottom: 10px; padding-right: 20px;">✅ <strong>Safari:</strong> التفضيلات → الأمان → تمكين JavaScript</li>
          <li style="padding-right: 20px;">✅ <strong>Edge:</strong> الإعدادات → ملفات تعريف الارتباط وأذونات الموقع → JavaScript</li>
        </ul>
      </div>
    </div>
  </noscript>
  
  <!-- حاوية تطبيق React -->
  <div id="root"></div>
